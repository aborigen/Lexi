<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="100%" stop-color="#E0F7FA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#skyGradient)" />
  
  <!-- Cloud Decoration -->
  <circle cx="420" cy="400" r="60" fill="white" fill-opacity="0.6" />
  <circle cx="360" cy="420" r="50" fill="white" fill-opacity="0.6" />
  
  <!-- Glow Link -->
  <path d="M150 350 C 100 200, 400 100, 362 250" stroke="#FFCC00" stroke-width="24" stroke-linecap="round" filter="url(#glow)" fill="none" />
  <circle cx="150" cy="350" r="20" fill="#FFCC00" filter="url(#glow)" />
  <circle cx="362" cy="250" r="20" fill="#FFCC00" filter="url(#glow)" />
  
  <!-- Letter L -->
  <text x="256" y="320" font-family="system-ui, sans-serif" font-weight="900" font-style="italic" font-size="280" fill="#FFCC00" text-anchor="middle" filter="url(#glow)" style="text-shadow: 0 10px 30px rgba(0,0,0,0.1)">L</text>
  
  <!-- Sun Reflection -->
  <circle cx="100" cy="100" r="40" fill="white" fill-opacity="0.3" />
</svg>